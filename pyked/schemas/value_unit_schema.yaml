# Common reference for value-unit schema
value-with-uncertainty: &value-with-uncertainty
  isvalid_uncertainty: true
  items:
    - anyof_type:
      - string
      - float
    - type: dict
      schema:
        uncertainty-type:
          type: string
          allowed:
            - absolute
            - relative
        uncertainty:
          anyof_type:
            - string
            - float
          excludes:
            - upper-uncertainty
            - lower-uncertainty
          dependencies:
            - uncertainty-type
        upper-uncertainty:
          anyof_type:
            - string
            - float
          excludes:
            - uncertainty
          dependencies:
            - lower-uncertainty
            - uncertainty-type
        lower-uncertainty:
          anyof_type:
            - string
            - float
          excludes:
            - uncertainty
          dependencies:
            - upper-uncertainty
            - uncertainty-type
        uncertainty-sourcetype:
          type: string
        evaluated-standard-deviation:
          anyof_type:
            - string
            - float
        evaluated-standard-deviation-type:
          type: string
          allowed:
            - absolute
            - relative
        evaluated-standard-deviation-sourcetype:
          type: string
        evaluated-standard-deviation-method:
          type: string
value-without-uncertainty: &value-without-uncertainty
  isvalid_quantity: true
  items:
    - anyof_type:
      - string
      - float
# Metadata-only: just uncertainty/ESD info without a value.
# Used in common-properties when uncertainty metadata is shared
# but the property value varies per datapoint.
value-metadata-only: &value-metadata-only
  items:
    - type: dict
      schema:
        uncertainty-type:
          type: string
          allowed:
            - absolute
            - relative
        uncertainty:
          anyof_type:
            - string
            - float
          excludes:
            - upper-uncertainty
            - lower-uncertainty
          dependencies:
            - uncertainty-type
        upper-uncertainty:
          anyof_type:
            - string
            - float
          excludes:
            - uncertainty
          dependencies:
            - lower-uncertainty
            - uncertainty-type
        lower-uncertainty:
          anyof_type:
            - string
            - float
          excludes:
            - uncertainty
          dependencies:
            - upper-uncertainty
            - uncertainty-type
        uncertainty-sourcetype:
          type: string
        evaluated-standard-deviation:
          anyof_type:
            - string
            - float
        evaluated-standard-deviation-type:
          type: string
          allowed:
            - absolute
            - relative
        evaluated-standard-deviation-sourcetype:
          type: string
        evaluated-standard-deviation-method:
          type: string
value-unit-required: &value-unit-required
  type: list
  required: true
  anyof:
    - *value-with-uncertainty
    - *value-without-uncertainty
value-unit-optional: &value-unit-optional
  type: list
  anyof:
    - *value-with-uncertainty
    - *value-without-uncertainty
    - *value-metadata-only
