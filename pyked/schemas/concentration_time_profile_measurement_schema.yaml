# Schema for concentration time profile measurement datapoints
#
# time-shift defines the t=0 reference for the profile
time-shift: &time-shift
  type: dict
  schema:
    target:
      required: true
      type: string
    type:
      required: true
      type: string
      allowed:
        - half decrease
        - relative decrease
    amount: *value-unit-optional

concentration-time-profile-measurement-schema: &concentration-time-profile-measurement-schema
  type: list
  minlength: 1
  schema:
    type: dict
    schema:
      pressure: *value-unit-required
      temperature: *value-unit-required
      composition: *composition
      equivalence-ratio: *value-unit-optional
      concentration-profiles:
        type: list
        required: true
        minlength: 1
        schema:
          type: dict
          schema:
            species-name:
              type: string
              required: true
            InChI:
              type: string
            SMILES:
              type: string
            quantity:
              required: true
              type: dict
              schema:
                units:
                  required: true
                  type: string
            time:
              required: true
              type: dict
              schema:
                units:
                  required: true
                  type: string
            values:
              required: true
              type: list
              minlength: 2
              schema:
                type: list
                oneof_items:
                  - - type: float
                    - type: float
                  - - type: float
                    - type: float
                    - type: float
      time-shift: *time-shift
