# Common reference for composition schema
composition: &composition
  isvalid_composition: true
  type: dict
  schema:
    kind:
      type: string
      allowed: ['mass fraction', 'mole fraction', 'mole percent', 'mol/cm3', 'mol/m3', 'mol/L', 'mol/dm3']
    species:
      type: list
      required: true
      minlength: 1
      schema:
        type: dict
        required: true
        schema:
          species-name:
            type: string
            required: true
          thermo:
            type: dict
            schema:
              T_ranges:
                type: list
                required: true
                isvalid_t_range: true
                items:
                  - oneof_type:
                    - number
                    - string
                  - oneof_type:
                    - number
                    - string
                  - oneof_type:
                    - number
                    - string
              data:
                type: list
                required: true
                items:
                  - type: number
                  - type: number
                  - type: number
                  - type: number
                  - type: number
                  - type: number
                  - type: number
                  - type: number
                  - type: number
                  - type: number
                  - type: number
                  - type: number
                  - type: number
                  - type: number
              note:
                type: string
          InChI:
            type: string
            excludes:
              - atomic-composition
              - SMILES
          SMILES:
            type: string
            excludes:
              - atomic-composition
              - InChI
          atomic-composition:
            type: list
            minlength: 1
            excludes:
              - InChI
              - SMILES
            schema:
              type: dict
              schema:
                element:
                  type: string
                amount:
                  type: float
                  min: 0.0
                  # TODO: option for float or int?
          amount:
            required: true
            type: list
            anyof:
              - items:
                - type: float
              - isvalid_uncertainty: true
                items:
                  - type: float
                  - type: dict
                    schema:
                      uncertainty-type:
                        type: string
                        allowed:
                          - absolute
                          - relative
                      uncertainty:
                        type: float
                        excludes:
                          - upper-uncertainty
                          - lower-uncertainty
                        dependencies:
                          - uncertainty-type
                      upper-uncertainty:
                        type: float
                        excludes: uncertainty
                        dependencies:
                          - lower-uncertainty
                          - uncertainty-type
                      lower-uncertainty:
                        type: float
                        excludes: uncertainty
                        dependencies:
                          - upper-uncertainty
                          - uncertainty-type
                      uncertainty-sourcetype:
                        type: string
                      evaluated-standard-deviation:
                        type: float
                      evaluated-standard-deviation-type:
                        type: string
                        allowed:
                          - absolute
                          - relative
                      evaluated-standard-deviation-sourcetype:
                        type: string
                      evaluated-standard-deviation-method:
                        type: string
